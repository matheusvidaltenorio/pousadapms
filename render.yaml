# Render Blueprint - Pousada PMS
# https://docs.render.com/blueprint-spec

databases:
  - name: pousada-db
    databaseName: pousada_pms
    plan: free

services:
  # API NestJS
  - type: web
    name: pousada-api
    runtime: node
    region: oregon

    buildCommand: npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npm run build:api
    startCommand: node apps/api/dist/main.js

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pousada-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false  # Defina a URL do frontend após deploy (ex: https://pousada-web.onrender.com)

  # Frontend React (Static Site)
  - type: web
    name: pousada-web
    runtime: static
    region: oregon

    buildCommand: npm install && npm run build:web
    staticPublishPath: apps/web/dist

    # SPA: roteamento client-side (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        sync: false  # Defina a URL da API após deploy (ex: https://pousada-api.onrender.com/api)
